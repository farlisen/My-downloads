name: Download and Mirror Files

on:
  push:
    branches:
      - main
  workflow_dispatch: # این خط بهت اجازه میده دستی هم اجراش کنی

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Downloader Script
        run: |
          # لیست فایل‌های تو اینجا قرار می‌گیرند
          items=(
            "https://nl.dl.parscdn.net/f/019dd349-be12-72ca-a5a9-2d72cdba1a4a/XXXFILE.ORG-Seltin_Sweety_01.mp4"
            "https://nl.dl.parscdn.net/f/019dd349-c31d-73c8-b093-a1e56196cf19/XXXFILE.ORG-Seltin_Sweety_03.mp4"
            "https://nl.dl.parscdn.net/f/019dd349-c31d-73c8-b093-a1e56196cf19/XXXFILE.ORG-Seltin_Sweety_03.mp4"
            "https://nl.dl.parscdn.net/f/019dd349-c31d-73c8-b093-a1e56196cf19/XXXFILE.ORG-Seltin_Sweety_03.mp4"
            "https://nl.dl.parscdn.net/f/019dd349-c8fc-7331-bea8-c75b46f06ae4/XXXFILE.ORG-Seltin_Sweety_05.mp4"
            "https://nl.dl.parscdn.net/f/019dd349-d484-7006-a97c-fb9a9f239bb3/XXXFILE.ORG-Seltin_Sweety_07.mp4"
            "https://nl.dl.parscdn.net/f/019dd349-d8cc-7260-bb2f-778142a32bb9/XXXFILE.ORG-Seltin_Sweety_08.mp4"
            "https://nl.dl.parscdn.net/f/019dd349-dcfe-73be-a6b7-ad7cb9e769f0/XXXFILE.ORG-Seltin_Sweety_09.mp4"
            "https://nl.dl.parscdn.net/f/019dd34b-48ac-713c-a945-e6a17653677f/XXXFILE.ORG-Seltin_Sweety_11.mp4"
            "https://nl.dl.parscdn.net/f/019dd34b-6210-70b5-a09a-f688313617e4/XXXFILE.ORG-Seltin_Sweety_12.mp4"
            "https://nl.dl.parscdn.net/f/019dd34b-7794-71a4-9f22-1b253c3b4246/XXXFILE.ORG-Seltin_Sweety_14.mp4"
            "https://nl.dl.parscdn.net/f/019dd34b-8fb5-7369-841e-e171ec0616e1/XXXFILE.ORG-Seltin_Sweety_13.mp4"
          )

          file_exists() {
            local f="$1"
            [[ -f "$f" ]] || [[ -f "$f.partaa" ]]
          }

          for item in "${items[@]}"; do
            if [[ "$item" == *"|"* ]]; then
              # بخش مربوط به گیت‌هاب (فعلا باهاش کار نداری)
              IFS='|' read -r repo file_pattern <<< "$item"
              tag=$(curl -s "https://api.github.com/repos/$repo/releases/latest" | jq -r .tag_name)
              filename="${file_pattern//"{tag}"/$tag}"
              url="https://github.com/$(echo $repo)/releases/download/$tag/$filename"
            else
              # بخش مربوط به لینک مستقیم تو (GetComics)
              url="$item"
              filename=$(basename "${url%%\?*}")
            fi

            if file_exists "$filename"; then
              echo "فایل $filename از قبل موجود است. اسکیپ شد."
              continue
            fi

            echo "در حال دانلود: $filename"
            wget -q --show-progress "$url" -O "$filename"

            # اگر فایل بزرگتر از 97 مگابایت بود، تیکه‌تیکه‌اش کن
            filesize=$(stat -c%s "$filename")
            if (( filesize > 97000000 )); then
              echo "فایل بزرگ است، در حال قطعه‌قطعه کردن..."
              split -b 95M "$filename" "$filename.part"
              rm "$filename"
              echo "cat $filename.part* > $filename" > reassemble.sh
            fi
          done

      - name: Commit and Push
        uses: EndBug/add-and-commit@v9
        with:
          author_name: Fardin-Bot
          message: "Add new file from direct link"
          add: "."
