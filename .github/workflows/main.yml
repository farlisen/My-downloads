name: Download and Mirror Files

on:
  push:
    branches:
      - main
  workflow_dispatch: # این خط بهت اجازه میده دستی هم اجراش کنی

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Downloader Script
        run: |
          # لیست فایل‌های تو اینجا قرار می‌گیرند
          items=(
            "https://nl.dl.parscdn.net/f/019dda0d-f8a6-7007-965c-ea01c7d5ade4/Zanzibar%20Tropical%20Yoga%201080p.mp4"
            "https://nl.dl.parscdn.net/f/019dda0e-733a-721d-991c-09e39cb83866/Blue%20Lingerie%2C%20Space%20Buns%201080p.mp4"
            "https://nl.dl.parscdn.net/f/019dda0e-9c13-7347-8c70-195f5e5dd7aa/Alice%20in%20Wonderland%201080p.mp4"
            "https://nl.dl.parscdn.net/f/019dda0e-c84d-725e-9cf6-3dd84cbf3950/Shower%20and%20Dildo%201920p.mp4"
            "https://nl.dl.parscdn.net/f/019dda0e-f16d-736f-b550-38ca9c8af7e0/Bathing%201920p.mp4"
            "https://nl.dl.parscdn.net/f/019dda0f-1701-73c5-980c-f8d6252ef945/Maid.mp4"
            "https://nl.dl.parscdn.net/f/019dda0f-40fe-701d-a852-4a3d65049cc4/Noir%20Romance%20-%20teaser.mp4"
            "https://nl.dl.parscdn.net/f/019dda0f-6164-7220-a992-7305401b1473/Homevideo.mov"
            "https://nl.dl.parscdn.net/f/019dda0f-8473-70c1-bf7a-6b9baec15fde/Evening%20treatments%201080p.mp4"
          )

          file_exists() {
            local f="$1"
            [[ -f "$f" ]] || [[ -f "$f.partaa" ]]
          }

          for item in "${items[@]}"; do
            if [[ "$item" == *"|"* ]]; then
              # بخش مربوط به گیت‌هاب (فعلا باهاش کار نداری)
              IFS='|' read -r repo file_pattern <<< "$item"
              tag=$(curl -s "https://api.github.com/repos/$repo/releases/latest" | jq -r .tag_name)
              filename="${file_pattern//"{tag}"/$tag}"
              url="https://github.com/$(echo $repo)/releases/download/$tag/$filename"
            else
              # بخش مربوط به لینک مستقیم تو (GetComics)
              url="$item"
              filename=$(basename "${url%%\?*}")
            fi

            if file_exists "$filename"; then
              echo "فایل $filename از قبل موجود است. اسکیپ شد."
              continue
            fi

            echo "در حال دانلود: $filename"
            wget -q --show-progress "$url" -O "$filename"

            # اگر فایل بزرگتر از 97 مگابایت بود، تیکه‌تیکه‌اش کن
            filesize=$(stat -c%s "$filename")
            if (( filesize > 97000000 )); then
              echo "فایل بزرگ است، در حال قطعه‌قطعه کردن..."
              split -b 95M "$filename" "$filename.part"
              rm "$filename"
              echo "cat $filename.part* > $filename" > reassemble.sh
            fi
          done

      - name: Commit and Push
        uses: EndBug/add-and-commit@v9
        with:
          author_name: Fardin-Bot
          message: "Add new file from direct link"
          add: "."
